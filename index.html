/* neutral flat polish: CSS only, no layout/function changes */
body{
  background:#FAF9F7;
}
.panel,
.card,
.empty,
.error,
.install-banner,
.history-modal,
.date-index-modal,
.taste-modal,
.taste-card{
  border-radius:4px !important;
  border-color:#E3DED8 !important;
  box-shadow:0 1px 4px rgba(45,42,38,.035) !important;
}
input,
select,
button,
.back-to-main,
.top-menu-btn,
.heart-top-btn,
.blank-top-btn,
.history-btn,
.move-btn,
.load-more-wrap button{
  border-radius:4px !important;
}
.history-pill,
.history-pill.recent,
.history-rate,
.date-chip,
.clear-date-btn{
  border-radius:4px !important;
}
.float-nav button,
.history-close,
.favorite-toggle,
.blank-top-btn.small,
.heart-top-btn.small{
  border-radius:4px !important;
}
.search-row input,
.detail-row input,
select{
  background:#FFFFFF;
  border-color:#E3DED8;
  box-shadow:none;
}
input:focus,
select:focus,
button:focus{
  border-color:#B78A96;
  box-shadow:0 0 0 2px rgba(183,138,150,.13);
}
button{
  box-shadow:none;
}
.card{
  background:#FFFFFF;
}
.book-title{
  color:#242220;
}
.book-meta{
  color:#5D5752;
}
.history-pill{
  background:#F1E6E9;
  border-color:#DED6D2;
  color:#9B6F7B;

.history-row,

      linear-gradient(currentColor,currentColor) left bottom / 100% 1.5px no-repeat;

@media(max-width:980px){
  .card-view-icon{
    width:16px;
    height:14px;
    display:grid;
    grid-template-columns:repeat(2, 6px);
    grid-template-rows:repeat(2, 6px);
    gap:2px;
    align-items:center;
    justify-content:center;
  }
  .card-view-icon::before{
    content:"";
    width:6px;
    height:6px;
    background:currentColor;
    box-shadow:
      8px 0 0 currentColor,
      0 8px 0 currentColor,
      8px 8px 0 currentColor;
  }

(function(){
  const tasteBackdrop=document.getElementById('tasteModalBackdrop');
  const tasteClose=document.getElementById('tasteModalClose');
  function closeTaste(){
    if(!tasteBackdrop) return;
    tasteBackdrop.classList.remove('open');
    tasteBackdrop.setAttribute('aria-hidden','true');
    document.body.classList.remove('modal-open');
  }
  if(tasteClose) tasteClose.addEventListener('click',closeTaste);
  if(tasteBackdrop) tasteBackdrop.addEventListener('click',function(e){if(e.target===tasteBackdrop) closeTaste();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeTaste();closeFavoriteMoveMenu&&closeFavoriteMoveMenu();}});
})();
</script><script>
(function(){
  if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    document.body.classList.add('standalone');
  }
})();
</script><script>
/* mobile-only heart removal JS fallback */
(function(){
  function isMobileLike(){
    return (window.matchMedia && (window.matchMedia('(max-width: 980px)').matches || window.matchMedia('(hover: none) and (pointer: coarse)').matches || window.matchMedia('(display-mode: standalone)').matches)) || window.navigator.standalone === true;
  }
  function applyMobileHeartVisibility(){
    var mobile=isMobileLike();
    var topHeart=document.getElementById('tasteTopBtn');
    if(topHeart){
      if(mobile){
        topHeart.style.setProperty('display','none','important');
        topHeart.style.setProperty('visibility','hidden','important');
        topHeart.setAttribute('aria-hidden','true');
        topHeart.tabIndex=-1;
      }else{
        topHeart.style.removeProperty('display');
        topHeart.style.removeProperty('visibility');
        topHeart.setAttribute('aria-hidden','false');
        topHeart.tabIndex=0;
      }
    }
    document.querySelectorAll('.favorite-toggle').forEach(function(btn){
      if(mobile){
        btn.style.setProperty('display','none','important');
        btn.style.setProperty('visibility','hidden','important');
        btn.setAttribute('aria-hidden','true');
        btn.tabIndex=-1;
      }else{
        btn.style.removeProperty('display');
        btn.style.removeProperty('visibility');
        btn.setAttribute('aria-hidden','false');
        btn.tabIndex=0;
      }
    });
  }
  document.addEventListener('DOMContentLoaded', applyMobileHeartVisibility);
  window.addEventListener('load', applyMobileHeartVisibility);
  window.addEventListener('resize', applyMobileHeartVisibility);
  window.addEventListener('orientationchange', applyMobileHeartVisibility);
  setInterval(applyMobileHeartVisibility, 800);
})();
</script></body></html>
