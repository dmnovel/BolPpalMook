/* neutral flat polish: CSS only, no layout/function changes */
body{
  background:#FAF9F7;
}
.panel,
.card,
.empty,
.error,
.install-banner,
.history-modal,
.date-index-modal,
.taste-modal,
.taste-card{
  border-radius:4px !important;
  border-color:#E3DED8 !important;
  box-shadow:0 1px 4px rgba(45,42,38,.035) !important;
}
input,
select,
button,
.back-to-main,
.top-menu-btn,
.heart-top-btn,
.blank-top-btn,
.history-btn,
.move-btn,
.load-more-wrap button{
  border-radius:4px !important;
}
.history-pill,
.history-pill.recent,
.history-rate,
.date-chip,
.clear-date-btn{
  border-radius:4px !important;
}
.float-nav button,
.history-close,
.favorite-toggle,
.blank-top-btn.small,
.heart-top-btn.small{
  border-radius:4px !important;
}
.search-row input,
.detail-row input,
select{
  background:#FFFFFF;
  border-color:#E3DED8;
  box-shadow:none;
}
input:focus,
select:focus,
button:focus{
  border-color:#B78A96;
  box-shadow:0 0 0 2px rgba(183,138,150,.13);
}
button{
  box-shadow:none;
}
.card{
  background:#FFFFFF;
}
.book-title{
  color:#242220;
}
.book-meta{
  color:#5D5752;
}
.history-pill{
  background:#F1E6E9;
  border-color:#DED6D2;
  color:#9B6F7B;

.history-row,

      linear-gradient(currentColor,currentColor) left bottom / 100% 1.5px no-repeat;

@media(max-width:980px){
  .card-view-icon{
    width:16px;
    height:14px;
    display:grid;
    grid-template-columns:repeat(2, 6px);
    grid-template-rows:repeat(2, 6px);
    gap:2px;
    align-items:center;
    justify-content:center;
  }
  .card-view-icon::before{
    content:"";
    width:6px;
    height:6px;
    background:currentColor;
    box-shadow:
      8px 0 0 currentColor,
      0 8px 0 currentColor,
      8px 8px 0 currentColor;
  }
